info:
  name: Simple GET (All)
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:8080/api/v1/site
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
