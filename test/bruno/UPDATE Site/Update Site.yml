info:
  name: Update Site
  type: http
  seq: 1

http:
  method: PATCH
  url: http://localhost:8080/api/v1/site
  body:
    type: json
    data: |-
      {
        "id": 1,
        "url": "https://youtube.com",
        "expected_status_code": 201
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
