info:
  name: Youtube
  type: http
  seq: 2

http:
  method: POST
  url: ""
  body:
    type: json
    data: |-
      {
        "url": "https://youtube.com",
        "description": "Niche website for cat videos"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body
      operator: contains
      value: "constraint failed: UNIQUE constraint failed"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
