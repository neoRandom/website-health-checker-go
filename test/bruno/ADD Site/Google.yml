info:
  name: Google
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/api/v1/site
  body:
    type: json
    data: |-
      {
        "url": "https://google.com",
        "description": "Niche website for research"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body
      operator: contains
      value: "constraint failed: UNIQUE constraint failed"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
