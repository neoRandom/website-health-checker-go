info:
  name: Multiple Websites
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:8080/api/v1/site
  body:
    type: json
    data: |-
      [
        {
          "url": "https://github.com",
          "description": "Silly platform to upload code"
        },
        {
          "url": "https://craftinginterpreters.com/",
          "description": "Learn how to Code! Learn how to Interpret! Oh... wait..."
        }
      ]
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
